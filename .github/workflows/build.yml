name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          xcodebuild -project iBuildApp.xcodeproj \
            -scheme iBuildApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Payload folder
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/iBuildApp.app Payload/

      - name: Zip into IPA
        run: zip -r iBuildApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iBuildApp
          path: iBuildApp.ipa